# Netlify configuration for the Random Address Retriever frontend.
#
# - Builds the Vite SPA in apps/web and publishes apps/web/dist.
# - Proxies /api/* and /healthz through the api-proxy Edge Function, which
#   injects the API bearer token (and optional Cloudflare Access service-token
#   headers) server-side, then forwards to the Cloudflare Tunnel hostname.
# - Falls back to index.html for client-side SPA routing.
#
# Required runtime environment variables (set in the Netlify UI):
#   ADDRESS_API_URL     e.g. https://address-api.janac.me
#   ADDRESS_API_TOKEN   same value as the local API's .env.local
# Optional (only if Cloudflare Access is enabled in front of the tunnel):
#   CF_ACCESS_CLIENT_ID
#   CF_ACCESS_CLIENT_SECRET
# Optional (PostHog source-map upload — enables de-minified prod stack traces):
#   POSTHOG_API_KEY      Personal API key with error-tracking:write scope
#   POSTHOG_PROJECT_ID   Numeric project ID from PostHog project settings
#   POSTHOG_HOST         e.g. https://us.i.posthog.com (defaults to us)

[build]
  # The repo now commits pnpm-lock.yaml (v9, pnpm 9.14.4). Use corepack to install
  # pnpm and install from the lockfile for reproducible CI builds.
  command = "corepack enable && corepack prepare pnpm@9.14.4 --activate && pnpm install --frozen-lockfile && pnpm --filter @random-address/web build"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "22"

# Edge functions run before redirects, so these intercept API calls and
# terminate (return a Response) before the SPA fallback below is considered.
[[edge_functions]]
  path = "/api/*"
  function = "api-proxy"

[[edge_functions]]
  path = "/healthz"
  function = "api-proxy"

# SPA fallback for client-side routing. Does not affect /api/* or /healthz,
# which are handled by the Edge Function above.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
