<!doctype html>
<html lang="en-CA">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Address Retriever — Every Canadian address</title>
    <meta
      name="description"
      content="Get a real, randomly chosen Canadian address from the National Address Register. Search by province and city. Independent project, not affiliated with any government department."
    />
  </head>
  <body>
    <!--
      Hidden, static form definitions so Netlify's build-time bot can detect the
      forms (it scans static HTML, not the JS-rendered React forms). The field
      names here must match those submitted from src/components/NetlifyForm.tsx.
      Submissions can be emailed for free via Site settings → Forms → notifications.
    -->
    <form name="api-access" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="organization" />
      <input type="text" name="interest" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
    <form name="feedback" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="type" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
