name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: typecheck, build, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: random_address_retriever
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ADDRESS_API_TOKEN: ci-token
      PGHOST: 127.0.0.1
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: random_address_retriever

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter random-address-api run typecheck

      - name: Build
        run: pnpm --filter random-address-api run build

      - name: Seed test database
        working-directory: server
        run: psql "postgresql://postgres:postgres@127.0.0.1:5432/random_address_retriever" -v ON_ERROR_STOP=1 -f test/fixtures/seed.sql

      - name: Test (unit + integration)
        run: pnpm --filter random-address-api run test
        env:
          RUN_DB_TESTS: "1"
          TEST_CITY: Burlington
          TEST_PROVINCE: ON
